<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FloMKa Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#0F0D0B;color:#F5F0E8;min-height:100vh;display:flex}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600}
input,textarea,select{font-family:'Jost',sans-serif;width:100%;padding:9px 12px;border:1px solid #2E2620;border-radius:2px;font-size:13px;background:#1C1814;color:#F5F0E8;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:#C9A84C}
textarea{resize:vertical;min-height:80px}
select option{background:#1C1814}
label{font-size:11px;font-weight:600;display:block;margin-bottom:4px;color:#8C8279;letter-spacing:.06em;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #2E2620;border-radius:2px;background:transparent;color:#DDD5C8;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Jost',sans-serif;white-space:nowrap}
.btn:hover{border-color:#C9A84C;color:#C9A84C}
.btn-red{background:#A6192E;color:#fff;border-color:#A6192E}
.btn-red:hover{background:#8B1425;border-color:#8B1425;color:#fff}
.btn-gold{background:#C9A84C;color:#1C1814;border-color:#C9A84C;font-weight:600}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-green{background:#1A4A28;border-color:#2D6A3F;color:#5AAF7A}
.btn-green:hover{background:#2D6A3F;color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.fade-in{animation:fadeIn .3s ease}
/* Sidebar */
.sidebar{width:220px;background:#0A0907;border-right:1px solid #1E1A16;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid #1E1A16}
.sidebar-logo-box{width:28px;height:28px;background:#A6192E;border-radius:2px;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle}
.sidebar-logo-text{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:14px;color:#fff}
.sidebar-brand{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;vertical-align:middle}
.sidebar-tag{font-size:9px;color:#C9A84C;letter-spacing:.1em;display:block;margin-top:2px;padding-left:36px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;font-size:13px;color:#8C8279;border-left:2px solid transparent;transition:all .2s}
.nav-item:hover{color:#DDD5C8;background:#14110E}
.nav-item.active{color:#C9A84C;border-left-color:#C9A84C;background:#14110E}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-section{padding:16px 18px 6px;font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4A4038}
.sidebar-footer{margin-top:auto;padding:16px 18px;border-top:1px solid #1E1A16;font-size:12px;color:#4A4038}
/* Main */
.main{flex:1;margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#0A0907;border-bottom:1px solid #1E1A16;padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.content{padding:28px;flex:1}
/* Cards */
.card{background:#14110E;border:1px solid #1E1A16;border-radius:3px;padding:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:#DDD5C8}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-box{background:#14110E;border:1px solid #1E1A16;border-top:2px solid;border-radius:3px;padding:16px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:#8C8279;letter-spacing:.04em}
/* Table */
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:8px 12px;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4A4038;border-bottom:1px solid #1E1A16}
.table td{padding:10px 12px;font-size:12.5px;border-bottom:1px solid #14110E;vertical-align:middle}
.table tr:hover td{background:#0F0D0B}
.table tr:last-child td{border-bottom:none}
/* Badge */
.badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase}
.badge-green{background:#1A3A22;color:#5AAF7A}
.badge-red{background:#3A1018;color:#E57389}
.badge-gold{background:#3A2A08;color:#C9A84C}
.badge-gray{background:#1E1A16;color:#8C8279}
/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
/* Toggle */
.toggle{position:relative;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.toggle input{position:absolute;opacity:0;width:0;height:0}
.toggle-track{width:34px;height:18px;background:#2E2620;border-radius:9px;transition:background .2s;flex-shrink:0}
.toggle input:checked + .toggle-track{background:#C9A84C}
.toggle-thumb{position:absolute;left:2px;top:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px)}
/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0907}
.login-box{background:#14110E;border:1px solid #1E1A16;border-top:3px solid #A6192E;border-radius:4px;padding:40px;width:400px}
/* Toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#2D6A3F;color:#fff;padding:11px 16px;border-radius:3px;font-size:13px;font-weight:500;animation:fadeIn .3s ease;max-width:300px}
.toast.error{background:#A6192E}.toast.warning{background:#C9A84C;color:#1C1814}
/* Section */
.page-section{display:none}.page-section.active{display:block}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid #1E1A16;margin-bottom:24px}
.tab{padding:9px 18px;border:none;background:none;font-size:12.5px;cursor:pointer;color:#8C8279;border-bottom:2px solid transparent;font-family:'Jost',sans-serif;transition:all .2s;margin-bottom:-1px}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C;font-weight:500}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#14110E;border:1px solid #2E2620;border-top:2px solid #C9A84C;border-radius:4px;padding:30px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeIn .3s ease}
</style>

<script>

// ===================== UTILS =====================
function c(id){ return document.getElementById(id); }
function toast(msg, type='success'){
  const w = c('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type!=='success'?' '+type:'');
  el.textContent = (type==='success'?'✓ ':type==='error'?'✕ ':'⚠ ') + msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
function timeAgo(d){ const h=Math.floor((Date.now()-new Date(d))/3600000); return h<1?'just now':h<24?h+'h ago':Math.floor(h/24)+'d ago'; }
function closeModal(){ c('modal-root').innerHTML=''; }

// ===================== UTILS (early) =====================
function esc(str){ 
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); 
}

// ===================== AUTH =====================
async function initAdmin(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session?.user){
    if(session.user.email !== ADMIN_EMAIL && !session.user.email.endsWith('@flomka.ai')){
      renderLoginPage('Access denied. Admin only.');
      await sb.auth.signOut();
      return;
    }
    adminUser = session.user;
    renderAdminApp();
    loadAllData();
  } else {
    renderLoginPage();
  }
}

function renderLoginPage(err=''){
  c('app').innerHTML = `
  <div class="login-wrap">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:28px">
        <div style="margin-bottom:12px">

            <rect x="7" y="9" width="3" height="20" rx="1.5" fill="#FAF7F2"/>
            <rect x="17" y="11" width="8" height="2.5" rx="1.25" fill="#C9A84C"/>
            <rect x="17" y="16" width="5" height="2" rx="1" fill="#C9A84C" opacity="0.65"/>
            <rect x="17" y="21" width="9" height="2" rx="1" fill="#C9A84C" opacity="0.35"/>
            <text x="36" y="24" font-family="Georgia, serif" font-size="18" font-weight="700" letter-spacing="-0.5">
              <tspan fill="#FAF7F2">Flo</tspan><tspan fill="#E57389">M</tspan><tspan fill="#FAF7F2">K</tspan><tspan fill="#C9A84C">a</tspan>
            </text>
          </svg>
        </div>
        <h2 style="font-size:22px;margin-bottom:4px">FloMKa Admin</h2>
        <p style="font-size:12.5px;color:#8C8279">Restricted access — admin only</p>
        ${err?`<div style="margin-top:10px;color:#E57389;font-size:12.5px;background:#3A1018;padding:8px 12px;border-radius:2px">${err}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label>Admin email</label><input type="email" id="a-email" placeholder="admin@flomka.ai"/></div>
        <div><label>Password</label><input type="password" id="a-pw" placeholder="••••••••"/></div>
        <div id="a-err" style="display:none;color:#E57389;font-size:12.5px"></div>
        <button id="a-btn" onclick="adminLogin()" class="btn btn-red" style="padding:12px;width:100%;justify-content:center">Sign in to Admin</button>
      </div>
    </div>
  </div>`;
}

async function adminLogin(){
  const email = c('a-email')?.value;
  const pw = c('a-pw')?.value;
  if(!email||!pw){ c('a-err').textContent='Fill all fields'; c('a-err').style.display='block'; return; }
  const btn = c('a-btn');
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ c('a-err').textContent=error.message; c('a-err').style.display='block'; btn.innerHTML='Sign in to Admin'; btn.disabled=false; return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(session?.user?.email !== ADMIN_EMAIL && !session?.user?.email?.endsWith('@flomka.ai')){
    await sb.auth.signOut();
    renderLoginPage('Access denied. This account is not an admin.');
    return;
  }
  adminUser = session.user;
  renderAdminApp();
  loadAllData();
}

async function adminLogout(){ await sb.auth.signOut(); renderLoginPage(); }

// ===================== RENDER APP =====================
function renderAdminApp(){
  c('app').innerHTML = `
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <svg width="130" height="44" viewBox="0 0 130 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="4" width="32" height="32" rx="5" fill="#A6192E"/>
        <rect x="7" y="10" width="15" height="3.5" rx="1.5" fill="#FAF7F2"/>
        <rect x="7" y="18" width="10" height="3" rx="1.5" fill="#FAF7F2"/>

        <rect x="18" y="12" width="9"  height="3" rx="1.5" fill="#C9A84C"/>
        <rect x="18" y="18" width="6"  height="2.5" rx="1.25" fill="#C9A84C" opacity="0.65"/>
        <rect x="18" y="24" width="11" height="2.5" rx="1.25" fill="#C9A84C" opacity="0.35"/>
        <text x="38" y="26" font-family="Georgia, serif" font-size="20" font-weight="700" letter-spacing="-0.5">
          <tspan fill="#FAF7F2">Flo</tspan><tspan fill="#E57389">M</tspan><tspan fill="#FAF7F2">K</tspan><tspan fill="#C9A84C">a</tspan>
        </text>
        <text x="39" y="37" font-family="Georgia, serif" font-size="7" fill="#C9A84C" letter-spacing="2">ADMIN PANEL</text>
      </svg>
    </div>
    <div style="padding:10px 0">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" data-section="dashboard" onclick="showSection('dashboard',this)">
        <span class="nav-icon">📊</span> Dashboard
      </div>
      <div class="nav-section">Content</div>
      <div class="nav-item" data-section="tools" onclick="showSection('tools',this)">
        <span class="nav-icon">🛠</span> Tools
      </div>
      <div class="nav-item" data-section="complaints" onclick="showSection('complaints',this)">
        <span class="nav-icon">⚠️</span> Complaints
      </div>
      <div class="nav-item" data-section="ideas" onclick="showSection('ideas',this)">
        <span class="nav-icon">💡</span> Ideas
      </div>
      <div class="nav-section">Business</div>
      <div class="nav-item" data-section="subscribers" onclick="showSection('subscribers',this)">
        <span class="nav-icon">📧</span> Subscribers
      </div>
      <div class="nav-item" data-section="payments" onclick="showSection('payments',this)">
        <span class="nav-icon">💳</span> Payments
      </div>
      <div class="nav-item" data-section="users" onclick="showSection('users',this)">
        <span class="nav-icon">👤</span> Users
      </div>
    </div>
    <div class="sidebar-footer">
      <div style="margin-bottom:8px;color:#DDD5C8;font-size:12px">${adminUser?.email}</div>
      <button class="btn btn-sm" onclick="adminLogout()" style="width:100%;justify-content:center">Sign out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:#4A4038" id="last-sync-label">Last sync: just now</span>
        <button class="btn btn-sm btn-gold" onclick="loadAllData()">⟳ Refresh</button>
        <a href="index.html" target="_blank" class="btn btn-sm">View site →</a>
      </div>
    </div>
    <div class="content">
      <div id="section-dashboard" class="page-section active"></div>
      <div id="section-tools" class="page-section"></div>
      <div id="section-complaints" class="page-section"></div>
      <div id="section-ideas" class="page-section"></div>
      <div id="section-subscribers" class="page-section"></div>
      <div id="section-payments" class="page-section"></div>
      <div id="section-users" class="page-section"></div>
    </div>
  </div>`;
}

function showSection(name, el){
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  const sec = c('section-' + name);
  if(sec){ sec.classList.add('active'); renderSection(name); }
  const titles = {dashboard:'Dashboard',tools:'Manage Tools',complaints:'Manage Complaints',ideas:'Manage Ideas',subscribers:'Newsletter Subscribers',payments:'Payments',users:'Users'};
  if(c('topbar-title')) c('topbar-title').textContent = titles[name] || name;
}

// ===================== LOAD DATA =====================
async function loadAllData(){
  const [toolsRes, complaintsRes, ideasRes, subsRes, paymentsRes] = await Promise.all([
    sb.from('tools').select('*').order('rank', { nullsFirst: false }),
    sb.from('complaints').select('*').order('created_at', { ascending: false }),
    sb.from('ideas').select('*').order('score', { ascending: false }),
    sb.from('newsletter_subscribers').select('*').order('created_at', { ascending: false }),
    sb.from('payments').select('*').order('created_at', { ascending: false })
  ]);
  allTools = toolsRes.data || [];
  allComplaints = complaintsRes.data || [];
  allIdeas = ideasRes.data || [];
  allSubscribers = subsRes.data || [];
  allPayments = paymentsRes.data || [];
  renderSection(currentSection);
  const syncLabel = c('last-sync-label');
  if(syncLabel) syncLabel.textContent = 'Last sync: ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  toast('Data refreshed');
}

function renderSection(name){
  switch(name){
    case 'dashboard': renderDashboard(); break;
    case 'tools': renderToolsSection(); break;
    case 'complaints': renderComplaintsSection(); break;
    case 'ideas': renderIdeasSection(); break;
    case 'subscribers': renderSubscribersSection(); break;
    case 'payments': renderPaymentsSection(); break;
    case 'users': renderUsersSection(); break;
  }
}

// ===================== DASHBOARD =====================
function renderDashboard(){
  const el = c('section-dashboard');
  const paidPayments = allPayments.filter(p => p.status === 'paid');
  const revenue = paidPayments.reduce((sum, p) => sum + (p.amount||0)/100, 0);
  el.innerHTML = `
  <div class="stats-grid">
    <div class="stat-box" style="border-top-color:#A6192E">
      <div class="stat-num">${allTools.filter(t=>t.published).length}</div>
      <div class="stat-label">Published tools</div>
    </div>
    <div class="stat-box" style="border-top-color:#C9A84C">
      <div class="stat-num">${allComplaints.filter(x=>x.published).length}</div>
      <div class="stat-label">Published complaints</div>
    </div>
    <div class="stat-box" style="border-top-color:#2D6A3F">
      <div class="stat-num">${allSubscribers.length}</div>
      <div class="stat-label">Newsletter subscribers</div>
    </div>
    <div class="stat-box" style="border-top-color:#5B3FA6">
      <div class="stat-num">₹${revenue.toLocaleString()}</div>
      <div class="stat-label">Total revenue</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <!-- Recent complaints pending -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Pending complaints</span>
        <button class="btn btn-sm" onclick="showSection('complaints', document.querySelector('[data-section=complaints]'))">View all</button>
      </div>
      ${allComplaints.filter(x=>!x.published).slice(0,5).map(comp=>`
      <div style="display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #1E1A16">
        <div style="flex:1">
          <div style="font-size:12.5px;font-weight:500;color:#DDD5C8;margin-bottom:2px">${comp.tool}</div>
          <div style="font-size:11.5px;color:#8C8279;line-height:1.4">${esc(comp.complaint).slice(0,70)}…</div>

async function saveTool(id){
  const name = c('m-name').value.trim();
  const slug = c('m-slug').value.trim().toLowerCase().replace(/\s+/g,'-');
  const desc = c('m-desc').value.trim();
  if(!name||!slug||!desc){ c('m-err').textContent='Name, slug, and description are required'; c('m-err').style.display='block'; return; }
  const btn = c('m-save'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  const data = {
    name, slug, description: desc,
    cat: c('m-cat').value,
    score: parseInt(c('m-score').value)||50,
    rank: parseInt(c('m-rank').value)||99,
    change: c('m-change').value||'+0',
    trend: c('m-change').value?.startsWith('+')||c('m-change').value==='New' ? 'up' : 'down',
    price: c('m-price').value||'Free',
    website: c('m-website').value||'',
    users_count: c('m-users').value||'',
    votes: parseInt(c('m-votes').value)||0,
    tags: c('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    published: c('m-pub').checked,
    featured: c('m-featured').checked,
    sponsored: c('m-sponsored').checked,
    updated_at: new Date().toISOString()
  };
  const { error } = id
    ? await sb.from('tools').update(data).eq('id', id)
    : await sb.from('tools').insert(data);
  if(error){ c('m-err').textContent=error.message; c('m-err').style.display='block'; btn.innerHTML='Save tool'; btn.disabled=false; return; }
  toast(id ? 'Tool updated!' : 'Tool added!');
  closeModal();
  await loadAllData();
}

async function updateRank(id, val){
  await sb.from('tools').update({rank:parseInt(val), updated_at:new Date().toISOString()}).eq('id',id);
  toast('Rank updated');
}
async function updateScore(id, val){
  await sb.from('tools').update({score:parseInt(val), updated_at:new Date().toISOString()}).eq('id',id);
  toast('Score updated');
}

  await loadAllData();
}

// ===================== QUICK ADD =====================
async function quickAddTool(){
  const name = c('q-tool-name')?.value?.trim();
  const score = parseInt(c('q-tool-score')?.value)||75;
  const cat = c('q-tool-cat')?.value;
  const desc = c('q-tool-desc')?.value?.trim();
  if(!name||!desc){ toast('Name and description required','error'); return; }
  const slug = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const rank = Math.max(...allTools.map(t=>t.rank), 0) + 1;
  const { error } = await sb.from('tools').insert({ name, slug, cat, score, description:desc, rank, change:'+New', trend:'up', price:'Free', website:'', votes:0, tags:[], published:true });
  if(error){ toast(error.code==='23505'?'Slug already exists':'Error: '+error.message,'error'); return; }
  toast(`Tool "${name}" added and published!`);
  c('q-tool-name').value=''; c('q-tool-score').value=''; c('q-tool-desc').value='';
  await loadAllData();
}

async function quickAddComplaint(){
  const tool = c('q-comp-tool')?.value?.trim();

// ===================== SUBSCRIBERS =====================
function renderSubscribersSection(){
  const el = c('section-subscribers');
  el.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <h2 style="font-size:26px;margin-bottom:2px">Newsletter Subscribers</h2>
      <p style="font-size:12.5px;color:#8C8279">${allSubscribers.length} total subscribers</p>
    </div>
    <button class="btn btn-gold" onclick="exportSubscribers()">⬇ Export CSV</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="table">
      <thead><tr><th>#</th><th>Email</th><th>Subscribed</th></tr></thead>
      <tbody>
        ${allSubscribers.map((s,i)=>`
        <tr>
          <td style="color:#4A4038">${i+1}</td>
          <td style="color:#DDD5C8">${s.email}</td>
          <td style="color:#8C8279">${new Date(s.created_at).toLocaleDateString('en-IN')}</td>
        </tr>`).join('')}

function exportSubscribers(){
  const csv = 'Email,Subscribed\n' + allSubscribers.map(s=>`${s.email},${s.created_at}`).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='flomka_subscribers.csv'; a.click();
  toast('Exported!');
}

  <div style="margin-bottom:20px">
    <h2 style="font-size:26px;margin-bottom:2px">Users</h2>

  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="table">
      <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>
        ${(profiles||[]).map(u=>`
        <tr>

          <td style="color:#8C8279">${u.email}</td>
          <td>
            <select onchange="updateUserPlan('${u.id}',this.value)" style="width:auto;padding:3px 6px;font-size:12px">
              ${['free','pro','api'].map(p=>`<option ${u.plan===p?'selected':''}>${p}</option>`).join('')}

          <td>
            <button class="btn btn-sm" onclick="toast('Email user: '+this.closest('tr').querySelector('td:nth-child(2)').textContent)">📧</button>
          </td>
        </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:#4A4038;padding:24px">No users yet</td></tr>'}
      </tbody>
    </table>
  </div>`;
}

async function updateUserPlan(userId, plan){
  const { error } = await sb.from('profiles').update({plan, updated_at:new Date().toISOString()}).eq('id',userId);
  if(error){ toast('Error: '+error.message,'error'); return; }
  toast('User plan updated to '+plan);
}

// ===================== SHARED ACTIONS =====================
async function publishItem(table, id, val){
  const { error } = await sb.from(table).update({published:val, updated_at:new Date().toISOString()}).eq('id',id);
  if(error){ toast('Error: '+error.message,'error'); return; }
  toast(val ? 'Published!' : 'Unpublished');
  await loadAllData();
}

async function deleteItem(table, id, label){
  if(!confirm(`Delete ${label}? This cannot be undone.`)) return;
  const { error } = await sb.from(table).delete().eq('id',id);
  if(error){ toast('Error: '+error.message,'error'); return; }
  toast('Deleted');
  await loadAllData();
}

  if(e.key === 'Escape') closeModal();
});

initAdmin();
