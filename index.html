function c(id){ return document.getElementById(id); }
function toast(msg, type='success'){
  const w = c('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type !== 'success' ? ' ' + type : '');
  el.textContent = (type==='success'?'✓ ':type==='error'?'✕ ':'⚠ ') + msg;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function timeAgo(dateStr){
  const diff = Date.now() - new Date(dateStr).getTime();
  const h = Math.floor(diff/3600000);
  if(h < 1) return 'just now';
  if(h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function navigate(page){
  currentPage = page;
  // Clear cache so admin changes show immediately on next visit
  clearCache();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = c('page-' + page);
  if(el){ el.classList.add('active'); renderPage(page); }
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.page === page));
  window.scrollTo({top:0, behavior:'smooth'});
}

// ===================== AUTH =====================
async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session?.user){
    currentUser = session.user;
    await loadProfile();
    await loadUserInteractions();
  }
  renderNavAuth();

  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session?.user){
      currentUser = session.user;
      await loadProfile();
      await loadUserInteractions();
      renderNavAuth();
      closeModal('auth-modal');
      document.body.style.overflow = '';
      toast(`Welcome to FloMKa, ${currentProfile?.name || 'friend'}! 🎉`);
      setTimeout(() => navigate('dashboard'), 400);
    } else if(event === 'SIGNED_OUT'){
      currentUser = null;
      currentProfile = null;
      userVotes = new Set();
      userSaves = new Set();
      renderNavAuth();
      navigate('home');
      toast('Signed out successfully');
    }
  });
}

async function loadProfile(){
  if(!currentUser) return;
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if(data) currentProfile = data;
    else {
      currentProfile = {
        id: currentUser.id,
        name: currentUser.user_metadata?.name || currentUser.email?.split('@')[0] || 'User',
        email: currentUser.email || '',
        plan: 'free'
      };
    }
  } catch(e) {
    currentProfile = {
      id: currentUser.id,
      name: currentUser.user_metadata?.name || currentUser.email?.split('@')[0] || 'User',
      email: currentUser.email || '',
      plan: 'free'
    };
  }
}

async function loadUserInteractions(){
  if(!currentUser) return;
  try {
    const [votesRes, savesRes] = await Promise.all([
      sb.from('user_votes').select('item_id').eq('user_id', currentUser.id),
      sb.from('user_saves').select('item_slug').eq('user_id', currentUser.id)
    ]);
    if(votesRes.data) userVotes = new Set(votesRes.data.map(v => v.item_id));
    if(savesRes.data) userSaves = new Set(savesRes.data.map(s => s.item_slug));
  } catch(e) {
    console.warn('User interaction tables not ready yet.');
  }
}

async function submitAuth(mode){
  const name = mode === 'signup' ? (c('auth-name')?.value || '') : '';
  const email = c('auth-email')?.value || '';
  const pw = c('auth-pw')?.value || '';
  const errEl = c('auth-error');
  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };

  if(mode === 'signup' && !name.trim()){ showErr('Name is required'); return; }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showErr('Enter a valid email'); return; }
  if(!pw || pw.length < 8){ showErr('Password must be at least 8 characters'); return; }

  errEl.style.display = 'none';
  const btn = c('auth-submit');
  btn.innerHTML = '<span class="spinner"></span> Please wait…';
  btn.disabled = true;

  if(mode === 'signup'){
    const { error } = await sb.auth.signUp({
      email, password: pw,
      options: { data: { name } }
    });
    if(error){ btn.innerHTML = 'Create free account'; btn.disabled = false; showErr(error.message); return; }
    toast('Account created! Check your email to verify.');
    closeModal('auth-modal');
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if(error){ btn.innerHTML = 'Sign in to FloMKa'; btn.disabled = false; showErr(error.message); return; }
  }
}

function showForgot(){
  c('auth-modal').querySelector('.modal').innerHTML = `
    <h2 style="font-size:22px;margin-bottom:8px">Reset your password</h2>
    <p class="muted" style="font-size:13.5px;margin-bottom:24px">Enter your email and we'll send a reset link.</p>
    <div style="text-align:left;margin-bottom:16px"><label>Email address</label><input type="email" id="forgot-email" placeholder="you@example.com"/></div>
    <div id="forgot-err" style="display:none;color:#A6192E;font-size:12.5px;margin-bottom:10px"></div>

    <button onclick="openAuth('login')" style="margin-top:12px;background:none;border:none;color:#A6192E;cursor:pointer;font-size:13px;display:block;width:100%;text-align:center">← Back to sign in</button>`;

async function sendReset(){
  const email = c('forgot-email')?.value;
  if(!email){ c('forgot-err').textContent='Enter your email'; c('forgot-err').style.display='block'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password'
  });
  if(error){ c('forgot-err').textContent = error.message; c('forgot-err').style.display='block'; return; }
  toast('Reset link sent! Check your inbox.');
  closeModal('auth-modal');
}

// ===================== VOTES & SAVES =====================
async function handleVote(itemId, itemType, el){
  if(!currentUser){ openAuth('login'); toast('Sign in to vote', 'warning'); return; }
  const cnt = el.querySelector('.vote-cnt');
  const currentVal = parseInt(cnt?.textContent || 0);
  const hasVoted = userVotes.has(itemId);
  // Optimistic UI update first
  if(hasVoted){
    userVotes.delete(itemId); el.classList.remove('voted'); if(cnt) cnt.textContent = currentVal - 1;
  } else {
    userVotes.add(itemId); el.classList.add('voted'); if(cnt) cnt.textContent = currentVal + 1;
  }
  // Then try to persist
  try {
    if(hasVoted){
      await sb.from('user_votes').delete().eq('user_id', currentUser.id).eq('item_id', itemId);
    } else {
      await sb.from('user_votes').insert({ user_id: currentUser.id, item_id: itemId, item_type: itemType });
    }
  } catch(e) {
    console.warn('Vote not persisted — run schema.sql to enable DB votes.');
  }
}

async function handleSave(slug, el){
  if(!currentUser){ openAuth('login'); toast('Sign in to save tools', 'warning'); return; }
  const hasSaved = userSaves.has(slug);
  // Optimistic UI update
  if(hasSaved){
    userSaves.delete(slug); el.classList.remove('saved'); toast('Removed from saved', 'warning');
  } else {
    userSaves.add(slug); el.classList.add('saved'); toast('Tool saved! ✓');
  }
  // Then try to persist
  try {
    if(hasSaved){
      await sb.from('user_saves').delete().eq('user_id', currentUser.id).eq('item_slug', slug);
    } else {
      await sb.from('user_saves').insert({ user_id: currentUser.id, item_slug: slug, item_type: 'tool' });
    }
  } catch(e) {
    console.warn('Save not persisted — run schema.sql to enable DB saves.');
  }
}

// Always fetch fresh from Supabase — no caching so admin changes show instantly
async function fetchTools(force=false){
  if(cachedTools.length && !force) return cachedTools;
  try {
    const { data, error } = await sb.from('tools').select('*').eq('published', true).order('rank');
    if(error){
      console.warn('DB not set up yet, using fallback tools data. Run schema.sql in Supabase to fix.');
      cachedTools = FALLBACK_TOOLS;
      return cachedTools;
    }
    cachedTools = (data && data.length > 0) ? data : FALLBACK_TOOLS;
    return cachedTools;
  } catch(e) {
    console.warn('Tools fetch failed, using fallback:', e.message);
    cachedTools = FALLBACK_TOOLS;
    return cachedTools;
  }
}

function handleSearch(q){
  const drop = c('search-drop');
  if(q.length < 2){ drop.style.display = 'none'; return; }
  const tools = cachedTools.filter(t => t.name.toLowerCase().includes(q.toLowerCase()) || t.description.toLowerCase().includes(q.toLowerCase())).slice(0,3);
  const complaints = cachedComplaints.filter(comp => comp.tool.toLowerCase().includes(q.toLowerCase())).slice(0,2);
  if(!tools.length && !complaints.length){
    drop.innerHTML = `<div style="padding:16px;text-align:center;color:#7A7068;font-size:13px">No results for "${q}"</div>`;
    drop.style.display = 'block'; return;
  }
  let html = '';
  if(tools.length){
    html += `<div style="padding:6px 14px 3px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#7A7068">Tools</div>`;
    tools.forEach(t => {
      html += `<div onclick="navigate('tools');closeSearch()" style="padding:10px 14px;cursor:pointer;display:flex;gap:10px;align-items:center" onmouseover="this.style.background='#F5F0E8'" onmouseout="this.style.background='transparent'">
        <div style="width:30px;height:30px;background:#F9EAEC;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;color:#A6192E;font-size:14px">${t.name[0]}</div>
        <div><div style="font-size:13.5px;font-weight:500">${t.name}</div><div style="font-size:11px;color:#7A7068">${t.cat} — Score ${t.score}</div></div></div>`;
    });
  }
  if(complaints.length){
    html += `<div style="padding:6px 14px 3px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#7A7068;border-top:1px solid #EDE8E0">Complaints</div>`;
    complaints.forEach(comp => {
      html += `<div onclick="navigate('complaints');closeSearch()" style="padding:10px 14px;cursor:pointer;display:flex;gap:8px;align-items:flex-start" onmouseover="this.style.background='#F5F0E8'" onmouseout="this.style.background='transparent'">
        <span style="color:#A6192E">⚠</span><div><div style="font-size:13px;font-weight:500">${comp.tool}</div><div style="font-size:11px;color:#7A7068">${comp.complaint.slice(0,55)}</div></div></div>`;
    });
  }
  drop.innerHTML = html;
  drop.style.display = 'block';
}

async function submitComplaint(){
  const tool = c('comp-tool')?.value?.trim();
  const text = c('comp-text')?.value?.trim();
  const cat = c('comp-cat')?.value;
  if(!tool || !text){ toast('Please fill all fields', 'error'); return; }
  try {
    const { error } = await sb.from('complaints').insert({
      tool, complaint: text, cat, source: 'user', votes: 0, published: false
    });
    if(error){ toast('Complaint noted! (Run schema.sql to fully enable)', 'warning'); }
    else { toast('Complaint submitted! Under review. ✓'); }
  } catch(e) {
    toast('Complaint noted! (DB setup needed to persist)', 'warning');
  }
  c('comp-tool').value = ''; c('comp-text').value = '';
}

      <div style="margin-bottom:16px"><label>Full name</label><input type="text" id="set-name" value="${currentProfile?.name || ''}"/></div>
      <div style="margin-bottom:16px"><label>Email address</label><input type="email" id="set-email" value="${currentProfile?.email || currentUser?.email || ''}" disabled style="opacity:.6"/></div>
      <div style="margin-bottom:16px"><label>Newsletter frequency</label>
        <select><option>Daily digest</option><option>Weekly only</option><option>Off</option></select>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px">
        <button class="btn btn-red" id="save-btn" onclick="saveSettings()" style="padding:11px 24px">Save changes</button>
        <button class="btn" style="padding:11px 24px" onclick="renderDashContent()">Cancel</button>
      </div>
      <div style="margin-top:28px;padding:16px 18px;background:#F5F0E8;border:1px solid #DDD5C8;border-radius:3px;font-size:13px;color:#7A7068;margin-bottom:28px">
        <strong style="color:#3A3530">Current plan:</strong> ${currentProfile?.plan || 'free'} ·
        <button onclick="openWaitlist()" style="background:none;border:none;color:#A6192E;cursor:pointer;font-size:13px;text-decoration:underline">Join Waitlist →</button>
      </div>
      <div style="padding:20px;background:#F9EAEC;border:1px solid rgba(166,25,46,.19);border-radius:3px">
        <div style="font-size:13px;font-weight:600;color:#A6192E;margin-bottom:6px">Danger zone</div>
        <div style="font-size:13px;color:#7A7068;margin-bottom:12px">Permanently delete your account and all data.</div>
        <button class="btn btn-sm" style="border-color:#A6192E;color:#A6192E" onclick="if(confirm('Delete account? This cannot be undone.')) deleteAccount()">Delete account</button>
      </div>
    </div>`;
  }
}

async function saveSettings(){
  const name = c('set-name')?.value?.trim();
  if(!name){ toast('Please enter your name', 'error'); return; }
  const btn = c('save-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  const { error } = await sb.from('profiles').update({ name, updated_at: new Date().toISOString() }).eq('id', currentUser.id);
  if(error){ toast('Error saving. Try again.', 'error'); btn.innerHTML = 'Save changes'; btn.disabled = false; return; }
  currentProfile.name = name;
  btn.textContent = '✓ Saved!';
  btn.style.background = '#2D6A3F';
  setTimeout(() => { btn.textContent = 'Save changes'; btn.style.background = ''; btn.disabled = false; renderNavAuth(); }, 2500);
  toast('Settings saved!');
}

async function deleteAccount(){
  const { error } = await sb.auth.admin?.deleteUser(currentUser.id);
  await sb.auth.signOut();
}

// ===================== HISTORY HELPERS =====================
let activeHistCat = 'All';

function setHistCat(cat, btn){
  activeHistCat = cat;
  document.querySelectorAll('[data-hcat]').forEach(b => { b.classList.remove('btn-red'); });
  if(btn) btn.classList.add('btn-red');
  filterHistory();
}

function filterHistory(){
  const q = (document.getElementById('hist-search')?.value || '').toLowerCase();
  const filtered = cachedTools.filter(t =>
    (activeHistCat === 'All' || t.cat === activeHistCat) &&
    (!q || t.name.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q))
  ).sort((a,b) => b.score - a.score);

  const grid = document.getElementById('hist-grid');
  if(!grid) return;

  if(!filtered.length){
    grid.innerHTML = `<div style="text-align:center;padding:40px;color:#7A7068">No tools found</div>`;
    return;
  }

  grid.innerHTML = `
  <div style="background:#FFFDF9;border:1px solid #DDD5C8;border-radius:3px;overflow:hidden">
    <div style="display:grid;grid-template-columns:40px 1fr 100px 80px 80px 80px 110px;gap:0;padding:10px 16px;background:#F5F0E8;border-bottom:1px solid #DDD5C8">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068">#</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068">Tool</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068">Category</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068;text-align:center">Score</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068;text-align:center">Change</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068;text-align:center">Votes</div>
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A7068;text-align:center">Action</div>
    </div>
    ${filtered.map((t, i) => `
    <div style="display:grid;grid-template-columns:40px 1fr 100px 80px 80px 80px 110px;gap:0;padding:12px 16px;border-bottom:1px solid #EDE8E0;align-items:center;transition:background .15s" onmouseover="this.style.background='#F9F6F1'" onmouseout="this.style.background='transparent'">
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#C9A84C">${i+1}</div>
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          <div style="width:28px;height:28px;background:#F9EAEC;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;color:#A6192E;font-size:13px;flex-shrink:0">${t.name[0]}</div>
          <div>
            <div style="font-size:13.5px;font-weight:500">${t.name}</div>
            <div style="font-size:11px;color:#7A7068">${t.price || 'Free'}</div>
          </div>
          ${t.featured ? '<span style="font-size:8px;font-weight:700;background:#F0ECF9;border:1px solid rgba(91,63,166,.27);color:#5B3FA6;padding:1px 5px;border-radius:2px;letter-spacing:.06em">FEAT</span>' : ''}
          ${t.sponsored ? '<span style="font-size:8px;font-weight:700;background:#FBF5E6;border:1px solid rgba(201,168,76,.4);color:#A07830;padding:1px 5px;border-radius:2px;letter-spacing:.06em">SP</span>' : ''}
        </div>
      </div>
      <div><span style="font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:2px;background:#F5F0E8;color:#7A7068">${t.cat}</span></div>
      <div style="text-align:center">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;line-height:1;color:${t.score>=90?'#A6192E':t.score>=75?'#C9A84C':'#3A3530'}">${t.score}</div>
        <div style="height:3px;background:#EDE8E0;border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${t.score}%;background:${t.score>=90?'#A6192E':'#C9A84C'};border-radius:2px"></div></div>
      </div>
      <div style="text-align:center">
        <span style="font-size:12px;font-weight:600;color:${t.trend==='up'?'#2D6A3F':'#A6192E'}">${t.trend==='up'?'▲':'▼'} ${t.change}</span>
      </div>
      <div style="text-align:center;font-size:12.5px;color:#7A7068">${(t.votes||0).toLocaleString()}</div>
      <div style="text-align:center;display:flex;gap:5px;justify-content:center">
        <button class="btn btn-sm ${userVotes.has(t.id)?'voted':''}" onclick="handleVote('${t.id}','tool',this)" style="font-size:11px;padding:4px 8px">▲</button>
        <button class="btn btn-sm btn-icon saved-btn ${userSaves.has(t.slug)?'saved':''}" onclick="handleSave('${t.slug}',this)" style="font-size:11px;padding:4px 8px">🔖</button>
        <a href="https://${t.website}" target="_blank" class="btn btn-sm" style="font-size:11px;padding:4px 8px">↗</a>
      </div>
    </div>`).join('')}
  </div>`;
}

// Close modal on Escape key
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    closeModal('auth-modal');
  }
});

// Listen for real-time changes from Supabase
// When admin publishes something — index.html updates automatically
function initRealtimeSync(){
  try {
    sb.channel('public-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tools' }, () => {
        cachedTools = [];
        if(currentPage === 'home' || currentPage === 'tools' || currentPage === 'trends') renderPage(currentPage);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'complaints' }, () => {
        cachedComplaints = [];
        if(currentPage === 'home' || currentPage === 'complaints') renderPage(currentPage);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'ideas' }, () => {
        cachedIdeas = [];
        if(currentPage === 'home' || currentPage === 'ideas') renderPage(currentPage);
      })
      .subscribe();
  } catch(e) {
    console.warn('Realtime sync not available:', e.message);
  }
}

async function init(){
  initTicker();
  renderFooter();
  if(darkMode) c('dark-toggle').textContent = '☀️';
  await initAuth();
  await renderPage('home');
  initRealtimeSync();
}

init();
